name: "Idea Generation (Mon/Thu)"

on:
  schedule:
    # 월요일, 목요일 KST 오전 9시 (UTC 0시)
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cosmos
        uses: actions/checkout@v4
        with:
          path: cosmos

      - name: Checkout idea-bank
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zerovoids-idea-bank
          path: idea-bank
          token: ${{ secrets.IDEA_BANK_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd cosmos
          pnpm install

      - name: Generate idea
        id: generate
        run: |
          cd cosmos
          RESULT=$(pnpm run probe:idea-generator-critic --json --ideas-dir ../idea-bank/ideas 2>/dev/null | tail -1)
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Process result
        run: |
          cd idea-bank

          STATUS=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.status')
          FILENAME=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.filename')
          CONTENT=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.content')

          if [ "$STATUS" = "pass" ]; then
            echo "$CONTENT" > "ideas/$FILENAME"
            echo "Idea passed: $FILENAME"
          else
            echo "Idea failed — not saved"
          fi

      - name: Commit and push
        run: |
          cd idea-bank
          git config user.name "gio-hernandez-saito"
          git config user.email "gio.hernandez.saito@gmail.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: new idea $(date +%Y-%m-%d)"
            git push
          fi
